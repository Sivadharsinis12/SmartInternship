<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recommendation History</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#f4f6f9;
    color:#333;
}

/* HEADER */
.header{
    background:white;
    padding:20px 40px;
    box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.header h1{
    margin:0;
    font-size:28px;
}

.header p{
    margin:5px 0 0;
    color:#666;
}

/* FILTER BAR */
.filter-bar{
    margin:20px 40px;
    background:white;
    padding:15px 20px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.filter-bar select{
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* CARDS SECTION */
.cards{
    display:flex;
    gap:20px;
    margin:20px 40px;
}

.card{
    flex:1;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.card h3{
    margin-top:0;
    font-size:16px;
    color:#666;
}

.progress{
    background:#eee;
    border-radius:20px;
    height:8px;
    margin:8px 0;
}

.progress-bar{
    height:8px;
    border-radius:20px;
    background:black;
}

/* TABLE */
.table-container{
    margin:20px 40px;
    background:white;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.05);
    overflow:hidden;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:15px;
    text-align:left;
    border-bottom:1px solid #eee;
}

th{
    background:#fafafa;
    color:#666;
    font-size:14px;
}

.status{
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.applied{ background:#000; color:white; }
.saved{ background:#dbeafe; color:#1e40af; }
.ignored{ background:#eee; color:#777; }

/* Horizontal Menu */
.top-menu{
    background:#ffffff;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #e5e7eb;
}
.menu-left h3{font-size:14px;color:#888;}
.menu-right{display:flex;gap:10px;}
.menu-right a{
    padding:10px 20px;
    text-decoration:none;
    color:#333;
    border-radius:8px;
    font-weight:500;
}
.menu-right a.active{background:#111;color:#fff;}
.menu-right a:hover{background:#f0f0f0;}

/* FOOTER */
.footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
    color:#777;
}
</style>
</head>
<body>

<!-- Horizontal Menu -->
<div class="top-menu">
    <div class="menu-left">
        <h3>STUDENT PORTAL</h3>
    </div>
    <div class="menu-right">
        <a href="dashboard.html">Dashboard</a>
        <a href="history.html" class="active">Recommendation History</a>
        <a href="index.html" onclick="logout()">Logout</a>
    </div>
</div>

<div class="header">
    <h1>Recommendation History</h1>
    <p>Review and manage your personalized career suggestions.</p>
</div>

<script>
function logout() {
    localStorage.removeItem("loggedInUser");
}
</script>

<div class="filter-bar">
    <div>
        <select id="typeFilter">
            <option value="All">All</option>
            <option value="Internship">Internship</option>
            <option value="Course">Course</option>
        </select>
    </div>
</div>

<!-- TOP SKILLS -->
<div class="cards">
    <div class="card">
        <h3>Top Recommended Skills</h3>
        <div id="skillsContainer"></div>
    </div>

    <div class="card">
        <h3>Total Recommendations</h3>
        <h2 id="totalCount">0</h2>
    </div>

    <div class="card">
        <h3>Applied Count</h3>
        <h2 id="appliedCount">0</h2>
    </div>
</div>

<!-- TABLE -->
<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Date</th>
                <th>Score</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="historyTable"></tbody>
    </table>
</div>

<div class="footer">
    © 2026 CareerTrack AI Solutions
</div>

<script>
let historyData = [];

fetch('data.json')
.then(res => res.json())
.then(data => {
    historyData = data.history;
    renderPage(historyData);
});

function renderPage(data){

    // TOTAL COUNT
    document.getElementById('totalCount').innerText = data.length;

    // APPLIED COUNT
    const applied = data.filter(item => item.status === "Applied").length;
    document.getElementById('appliedCount').innerText = applied;

    // TOP SKILLS
    const skillCounts = {};
    data.forEach(item => {
        item.skills.forEach(skill => {
            skillCounts[skill] = (skillCounts[skill] || 0) + 1;
        });
    });

    const skillsContainer = document.getElementById('skillsContainer');
    skillsContainer.innerHTML = "";

    Object.keys(skillCounts).slice(0,4).forEach(skill => {
        const percent = skillCounts[skill] * 10;

        skillsContainer.innerHTML += `
            <div>${skill} (${percent}%)</div>
            <div class="progress">
                <div class="progress-bar" style="width:${percent}%"></div>
            </div>
        `;
    });

    // TABLE
    const table = document.getElementById('historyTable');
    table.innerHTML = "";

    data.forEach(item => {
        table.innerHTML += `
            <tr>
                <td>${item.id}</td>
                <td>${item.name}</td>
                <td>${item.category}</td>
                <td>${item.date}</td>
                <td>${item.score}% Match</td>
                <td><span class="status ${item.status.toLowerCase()}">${item.status}</span></td>
            </tr>
        `;
    });
}

// FILTER
document.getElementById('typeFilter').addEventListener('change', function(){
    const type = this.value;
    if(type === "All"){
        renderPage(historyData);
    } else {
        const filtered = historyData.filter(item => item.category === type);
        renderPage(filtered);
    }
});
</script>

</body>
</html>
